    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              custom: {
                bg: '#121212',
                card: '#1E1E1E',
                accent: '#FCA5A5', // Rose-300 like color from screenshot

                textMuted: '#9CA3AF',
                border: '#333333'
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #121212;
        color: #F3F4F6;

      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {

      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }
    </style>
